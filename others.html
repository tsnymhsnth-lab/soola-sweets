<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أشياء أخرى | Soola Sweets</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#FFD400;
padding:30px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:#BEEFFF;
padding:30px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

h1{
margin-bottom:25px;
color:#333;
}

.buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
}

button{
background:white;
border:none;
padding:15px 25px;
font-size:20px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#FFD400;
transform:scale(1.05);
}

.content{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
display:none;
}

.phone{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#d35400;
}

img{
width:100%;
max-width:500px;
border-radius:15px;
margin-top:15px;
}

/* الأسعار */
.price{
margin-top:15px;
font-size:18px;
line-height:2;
}

.price h3{
margin-bottom:10px;
color:#444;
}

</style>
</head>

<body>

<div class="container">

<h1>أشياء أخرى</h1>

<div class="buttons">

<button onclick="showKhibiz()">خبيز</button>
<button onclick="showNa3im()">ناعم</button>
<button onclick="showKawk()">كعك بلدي</button>

</div>

<!-- الناعم -->
<div id="na3im" class="content">
<h2>الناعم</h2>

<img src="sw/na.jpg" alt="ناعم">

<div class="price">
<h3>الأسعار</h3>
الكيلو 30.000<br>
<br>

</div>

</div>

<!-- الخبيز -->
<div id="khibiz" class="content">
<h2>الخبيز</h2>

<img src="sw/kh.jpg" alt="خبيز">

<div class="price">
<h3>الأسعار</h3>
<br> الكيلو 25.000 <br>
</div>

</div>

<!-- الكعك البلدي -->
<div id="kawk" class="content">
<h2>الكعك البلدي</h2>

<div class="price">
<h3>الأسعار</h3>
<br>الكيلو 30.000<br>
</div>

</div>

<!-- الأرقام -->
<div class="phone">
📞 0122125415<br>
📞 0119099941
</div>

</div>

<script>

function hideAll(){
document.getElementById("na3im").style.display="none";
document.getElementById("khibiz").style.display="none";
document.getElementById("kawk").style.display="none";
}

function showNa3im(){
hideAll();
document.getElementById("na3im").style.display="block";
}

function showKhibiz(){
hideAll();
document.getElementById("khibiz").style.display="block";
}

function showKawk(){
hideAll();
document.getElementById("kawk").style.display="block";
}

</script>

</body>
</html>
